name: security-scan

on:
  push:
    branches:
      - main
      - develop
  pull_request:

# 🔐 ESSENCIAL: permite o GitHub Actions escrever no repositório
permissions:
  contents: write

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout do código (com permissão correta)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      # 2. Setup PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.1

      # 3. Instalar dependências PHP
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      # 4. Criar diretório de reports
      - name: Prepare reports folder
        run: mkdir -p reports

      # 5. Instalar Trivy
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release

          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -

          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" \
          | sudo tee -a /etc/apt/sources.list.d/trivy.list

          sudo apt-get update
          sudo apt-get install -y trivy

      # 6. Rodar scan de segurança
      - name: Run Trivy scan
        run: trivy fs . -f json -o reports/report.json

      # 7. Upload do relatório como artifact (backup)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-json
          path: reports/report.json

      # 8. Commit e push do relatório no repositório (CORRIGIDO)
      - name: Commit and push report
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add reports/report.json

          # evita falha se não houver mudanças
          git commit -m "Atualiza relatório Trivy" || echo "Sem alterações para commit"

          # sincroniza com o repositório remoto antes do push
          git pull --rebase origin main

          # push seguro (sem 403 e sem conflito)
          git push origin main
